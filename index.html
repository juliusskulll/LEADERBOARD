<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Fortnite Stats (API)</title>
<style>
  body { background:#111; color:#fff; font-family:Arial; text-align:center; }
  input, button { padding:10px; margin:10px; }
</style>
</head>
<body>

<h1>Fortnite Stats Tracker</h1>

<input id="username" placeholder="hazelnutspread" value="hazelnutspread">
<button onclick="getStats()">Get Stats</button>

<div id="output"></div>

<script>
async function getStats() {
  const user = document.getElementById("username").value;

  // ⚠️ Replace with your API key from api-fortnite.com
  const API_KEY = "YOUR_API_KEY_HERE";

  try {
    const res = await fetch(`https://api.fortniteapi.io/v1/stats?name=${user}`, {
      headers: {
        "Authorization": API_KEY
      }
    });

    const data = await res.json();

    document.getElementById("output").innerHTML = `
      <h2>${data.name}</h2>
      <p>Kills: ${data.global_stats.kills}</p>
      <p>Wins: ${data.global_stats.wins}</p>
      <p>Matches: ${data.global_stats.matches}</p>
      <p>K/D: ${data.global_stats.kd}</p>
    `;
  } catch (e) {
    document.getElementById("output").innerHTML = "Error fetching stats";
    console.error(e);
  }
}
</script>

</body>
</html>
