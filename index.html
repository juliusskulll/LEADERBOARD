<!DOCTYPE html>
<html>
<head>
  <title>FortniteTracker Screenshot</title>
</head>
<body>
  <h1>FortniteTracker Leaderboard</h1>
  <button onclick="takeScreenshot()">Capture</button>
  <br><br>
  <img id="result" style="max-width:100%;" />

  <script>
    function takeScreenshot() {
      document.getElementById("result").src =
        "/screenshot?" + new Date().getTime();
    }
  </script>
</body>
</html>
